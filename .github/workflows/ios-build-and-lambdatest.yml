name: iOS Build and Optional LambdaTest Upload

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload Runner-unsigned.ipa
          mkdir Payload
          cp -R Runner.app Payload/
          /usr/bin/zip -r Runner-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/iphoneos/Runner-unsigned.ipa

      - name: Decode signing assets
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          set -e
          mkdir -p ios/signing
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > ios/signing/cert.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > ios/signing/profile.mobileprovision
          echo "$IOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > ios/signing/ExportOptions.plist

      - name: Configure keychain and provisioning profile
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import ios/signing/cert.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        run: flutter build ipa --export-options-plist=ios/signing/ExportOptions.plist

      - name: Upload signed IPA artifact
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload signed IPA to LambdaTest
        if: ${{ secrets.LAMBDATEST_USERNAME != '' && secrets.LAMBDATEST_ACCESS_KEY != '' && secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        env:
          LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
          LT_ORG_ID: ${{ secrets.LAMBDATEST_ORG_ID }}
        run: |
          set -e
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No signed IPA found."
            exit 1
          fi

          if [ -n "$LT_ORG_ID" ]; then
            RESPONSE=$(curl -sS -u "$LT_USERNAME:$LT_ACCESS_KEY" -X POST "https://manual-api.lambdatest.com/app/upload/realDevice" -F "appFile=@${IPA_PATH}" -F "name=ExpenseTracker-iOS" -F "organizationId=${LT_ORG_ID}")
          else
            RESPONSE=$(curl -sS -u "$LT_USERNAME:$LT_ACCESS_KEY" -X POST "https://manual-api.lambdatest.com/app/upload/realDevice" -F "appFile=@${IPA_PATH}" -F "name=ExpenseTracker-iOS")
          fi

          echo "$RESPONSE" > lambdatest-upload-response.json
          echo "### LambdaTest upload response" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat lambdatest-upload-response.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LambdaTest response artifact
        if: ${{ always() && secrets.LAMBDATEST_USERNAME != '' && secrets.LAMBDATEST_ACCESS_KEY != '' && secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: lambdatest-upload-response
          path: lambdatest-upload-response.json
